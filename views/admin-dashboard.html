<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/script.js" defer></script>
</head>
<body data-page="admin-dashboard">
  <nav class="navbar">
    <a class="brand" href="/admin-dashboard.html">Leave System</a>
    <div class="nav-links">
      <a href="/admin-dashboard.html">Dashboard</a>
      <button id="logoutBtn" class="link-button">Logout</button>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>Admin Dashboard</h1>
      <p class="muted">Review, approve, or reject employee leave requests.</p>
    </section>

    <section class="card">
      <div class="toolbar">
        <h2>Leave Requests</h2>
        <label for="statusFilter" class="inline-label">
          Filter
          <select id="statusFilter">
            <option value="All">All</option>
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
          </select>
        </label>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Employee</th>
              <th>Department</th>
              <th>Type</th>
              <th>Dates</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminRequestsBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Employee Details</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Department</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody id="employeesBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
