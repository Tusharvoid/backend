<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave History</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/script.js" defer></script>
</head>
<body data-page="leave-history">
  <nav class="navbar">
    <a class="brand" href="/employee-dashboard.html">Leave System</a>
    <div class="nav-links">
      <a href="/employee-dashboard.html">Dashboard</a>
      <a href="/apply-leave.html">Apply Leave</a>
      <a href="/leave-history.html">Leave History</a>
      <button id="logoutBtn" class="link-button">Logout</button>
    </div>
  </nav>

  <main class="container">
    <section class="page-header">
      <h1>Leave History</h1>
      <p class="muted">Track all your submitted leave requests.</p>
    </section>

    <section class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Start</th>
              <th>End</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Admin Comment</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
