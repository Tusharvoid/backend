<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Employee Leave System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/script.js" defer></script>
</head>
<body data-page="login">
  <main class="auth-page">
    <section class="auth-box">
      <h1>Employee Leave Management System</h1>
      <p class="muted">Login as an employee or admin to continue.</p>

      <form id="loginForm" class="form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="employee@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
      </form>

      <p id="message" class="message"></p>

      <div class="sample-login">
        <strong>Sample Login</strong>
        <p>Admin: admin@example.com / admin123</p>
        <p>Employee: employee@example.com / employee123</p>
      </div>
    </section>
  </main>
</body>
</html>
